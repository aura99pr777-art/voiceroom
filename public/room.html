<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceRoom</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="room-page">

  <!-- ── Top bar with all controls ──────────────────────── -->
  <header class="room-header">
    <div class="hdr-left">
      <span class="online-dot"></span>
      <span class="hdr-room-label">Room:</span>
      <strong id="room-name">room</strong>
      <button class="btn-copy-link" onclick="copyInvite()">
        <i class="fas fa-copy"></i> Copy Link
      </button>
    </div>
    <div class="hdr-right">
      <button class="hdr-icon-btn" title="Help" onclick="showToast('Enter a room code on the join page to invite friends!')">?</button>
      <button class="hdr-pill hdr-camera" id="btn-camera" onclick="toggleCamera()">
        <i class="fas fa-video"></i> Camera
      </button>
      <button class="hdr-pill hdr-screen" id="btn-screen" onclick="toggleScreenShare()">
        <i class="fas fa-desktop"></i> Screen
      </button>
      <button class="hdr-pill hdr-mute" id="btn-mute" onclick="toggleMute()">
        <i class="fas fa-microphone"></i> Mute
      </button>
      <button class="hdr-pill hdr-speakers" id="btn-deaf" onclick="toggleDeafen()">
        <i class="fas fa-volume-high"></i> Speakers
      </button>
      <button class="hdr-pill hdr-leave" onclick="leaveRoom()">Leave</button>
    </div>
  </header>

  <!-- ── Video / avatar grid ─────────────────────────────── -->
  <main class="video-container">
    <div id="video-grid" class="video-grid"></div>
  </main>

  <!-- ── Status bar ─────────────────────────────────────── -->
  <footer class="status-bar">
    <span class="status-item">
      <i class="fas fa-users"></i> <span id="peer-count">0</span> peers
    </span>
    <span class="status-sep">•</span>
    <span class="status-item">
      <i class="fas fa-circle-check"></i> <span id="conn-status">connecting…</span>
    </span>
    <span class="status-sep">•</span>
    <span class="status-item">
      <i class="fas fa-microphone"></i> Opus 48kbps
    </span>
    <span class="status-sep">•</span>
    <span class="status-item status-green" id="mic-status">
      <i class="fas fa-signal"></i> Active
    </span>
    <span class="status-sep">•</span>
    <span class="status-item status-green" id="server-status">
      <i class="fas fa-circle" style="font-size:.5rem"></i> Server connected
    </span>
  </footer>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
